{% extends 'core/base.html' %}
{% block title %}註冊 - 奇門遁甲{% endblock %}
{% block content %}
<div style="max-width:420px;margin:40px auto;">
  <div class="card">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:2.5rem;margin-bottom:8px;">🔮</div>
      <h2 style="color:var(--gold);">免費註冊</h2>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">用戶名</label>
        <input type="text" name="username" class="form-control" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">電郵（選填）</label>
        <input type="email" name="email" class="form-control">
      </div>
      <div class="form-group">
        <label class="form-label">密碼</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <div class="form-group">
        <label class="form-label">確認密碼</label>
        <input type="password" name="password2" class="form-control" required>
      </div>
      {% if form.errors %}
        {% for field in form %}{% for error in field.errors %}
          <div class="message message-error">{{ error }}</div>
        {% endfor %}{% endfor %}
      {% endif %}
      <button type="submit" class="btn btn-gold" style="width:100%;margin-top:8px;">立即註冊</button>
    </form>
    <hr class="divider">
    <p style="text-align:center;color:var(--text-muted);font-size:0.9rem;">
      已有帳號？<a href="{% url 'login' %}">登入</a>
    </p>
  </div>
</div>
{% endblock %}
