{% extends 'core/base.html' %}
{% block title %}WhatsApp 驗證 - 奇門遁甲{% endblock %}
{% block content %}
<div style="max-width:420px;margin:40px auto;">
  <div class="card" style="background:linear-gradient(135deg,rgba(107,33,168,0.3),rgba(45,27,94,0.5));border-color:var(--gold);">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:3rem;margin-bottom:8px;">📱</div>
      <h2 style="color:var(--gold);">WhatsApp 驗證</h2>
      <p style="color:var(--text-muted);font-size:0.9rem;margin-top:8px;">
        驗證碼已發送至 {{ vip.whatsapp_number }}
      </p>
    </div>

    <!-- 內測模式提示 -->
    <div style="background:rgba(245,158,11,0.15);border:1px solid var(--warning);border-radius:8px;padding:12px;margin-bottom:20px;text-align:center;">
      <p style="color:#fcd34d;font-size:0.9rem;">🧪 內測模式</p>
      <p style="color:var(--text-muted);font-size:0.85rem;">驗證碼：<strong style="color:var(--gold);font-size:1.2rem;letter-spacing:4px;">{{ vip.verification_code }}</strong></p>
      <p style="color:var(--text-muted);font-size:0.75rem;">（正式版將發送至 WhatsApp）</p>
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">輸入 6 位驗證碼</label>
        <input type="text" name="code" class="form-control" maxlength="6"
               placeholder="123456" required autofocus
               style="font-size:1.5rem;letter-spacing:8px;text-align:center;">
      </div>
      <button type="submit" class="btn btn-gold" style="width:100%;">確認驗證</button>
    </form>
  </div>
</div>
{% endblock %}
